<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Screen Name</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 400px;">
    <h2 class="mb-4">Edit Screen Name</h2>

    <form th:action="@{'/screens/' + ${screenId} + '/edit'}" th:object="${screenName}" method="post">
        <input type="hidden" name="cinemaId" th:value="${cinemaId}"/>

        <div class="mb-3">
            <label class="form-label">Screen Name</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn btn-outline-secondary" th:href="@{'/cinemas/' + ${cinemaId} + '/screens'}">Cancel</a>
    </form>
</div>
</body>
</html>

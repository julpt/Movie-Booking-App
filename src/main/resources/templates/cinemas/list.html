<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Cinemas</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Cinemas</h2>
        <a class="btn btn-primary" th:href="@{/cinemas/new}" sec:authorize="hasRole('ADMIN')">+ Add Cinema</a>
    </div>

    <div class="mb-3">
        Sort by:
        <a th:href="@{/cinemas(sortBy='name', direction='asc')}" class="btn btn-sm btn-outline-secondary">Name ↑</a>
        <a th:href="@{/cinemas(sortBy='name', direction='desc')}" class="btn btn-sm btn-outline-secondary">Name ↓</a>
        <a th:href="@{/cinemas(sortBy='city', direction='asc')}" class="btn btn-sm btn-outline-secondary">City ↑</a>
        <a th:href="@{/cinemas(sortBy='city', direction='desc')}" class="btn btn-sm btn-outline-secondary">City ↓</a>
    </div>

    <div class="mb-3">
        Items per page:
        <a th:href="@{/cinemas(size=5, sortBy=${currentSort}, direction=${currentDirection})}" class="btn btn-sm btn-outline-dark">5</a>
        <a th:href="@{/cinemas(size=10, sortBy=${currentSort}, direction=${currentDirection})}" class="btn btn-sm btn-outline-dark">10</a>
        <a th:href="@{/cinemas(size=20, sortBy=${currentSort}, direction=${currentDirection})}" class="btn btn-sm btn-outline-dark">20</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>City</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cinema : ${cinemaPage.content}">
            <td th:text="${cinema.name}"></td>
            <td th:text="${cinema.city}"></td>
            <td th:text="${cinema.address}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a class="btn btn-sm btn-secondary" th:href="@{'/cinemas/edit/' + ${cinema.id}}">Edit</a>
                <form th:action="@{'/cinemas/delete/' + ${cinema.id}}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Delete this cinema?');">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${cinemaPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${cinemaPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/cinemas(page=${cinemaPage.number - 1}, sortBy=${currentSort}, direction=${currentDirection})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, cinemaPage.totalPages - 1)}"
                th:classappend="${i == cinemaPage.number} ? 'active'">
                <a class="page-link" th:href="@{/cinemas(page=${i}, sortBy=${currentSort}, direction=${currentDirection})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${cinemaPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/cinemas(page=${cinemaPage.number + 1}, sortBy=${currentSort}, direction=${currentDirection})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>

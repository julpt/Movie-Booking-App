<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cinema Form</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <h2 th:text="${cinemaId != null} ? 'Edit Cinema' : 'New Cinema'">Cinema Form</h2>

    <form th:action="${cinemaId != null} ? @{'/cinemas/' + ${cinemaId}} : @{/cinemas}"
          th:object="${cinema}" method="post">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" th:field="*{name}" required maxlength="255"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">City</label>
            <input type="text" class="form-control" th:field="*{city}" required maxlength="100"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" th:field="*{address}" required maxlength="255"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn btn-outline-secondary" th:href="@{/cinemas}">Cancel</a>
    </form>
</div>
</body>
</html>

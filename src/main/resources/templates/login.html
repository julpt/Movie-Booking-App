<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-5" style="max-width: 400px;">
    <h2 class="mb-4">Login</h2>

    <div class="alert alert-danger" th:if="${param.error}">
        Invalid username or password.
    </div>
    <div class="alert alert-success" th:if="${param.logout}">
        You have been logged out.
    </div>
    <div class="alert alert-success" th:if="${param.registered}">
        Account created successfully! Please log in.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required/>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" name="remember-me" class="form-check-input" id="rememberMe"/>
            <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-center mt-3">
        Don't have an account? <a th:href="@{/register}">Register here</a>
    </p>

    <a class="btn btn-secondary w-100 mt-5" th:href="@{/movies}">Go back</a>
</div>
</body>
</html>
